<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Similar Players — NCAA Basketball</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .page {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ── Nav tabs ── */
        .nav-tabs {
            background: white;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.18);
            padding: 0 18px;
            display: flex;
            align-items: center;
            gap: 0;
            flex-wrap: wrap;
        }

        .nav-brand {
            font-size: 1em;
            font-weight: 700;
            color: #333;
            margin-right: 20px;
            padding: 14px 0;
            white-space: nowrap;
        }

        .nav-brand span { color: #667eea; }

        .nav-tab {
            padding: 14px 16px;
            font-size: 13px;
            font-weight: 600;
            color: #aaa;
            text-decoration: none;
            border-bottom: 3px solid transparent;
            transition: color 0.12s, border-color 0.12s;
            white-space: nowrap;
        }

        .nav-tab:hover { color: #667eea; }
        .nav-tab.active { color: #667eea; border-bottom-color: #667eea; }

        /* ── Search controls ── */

        /* ── Search ── */
        .search-wrap {
            position: relative;
            width: 280px;
        }

        .search-wrap input {
            width: 100%;
            padding: 8px 12px;
            border: 2px solid #e8e8e8;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
        }
        .search-wrap input:focus { border-color: #667eea; }

        .search-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0; right: 0;
            background: white;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            z-index: 100;
            margin-top: 4px;
            max-height: 240px;
            overflow-y: auto;
        }

        .search-dropdown.show { display: block; }

        .search-result {
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid #f5f5f5;
        }
        .search-result:last-child { border-bottom: none; }
        .search-result:hover { background: #f8f9ff; color: #667eea; }
        .search-result .sub { font-size: 11px; color: #aaa; margin-top: 1px; }

        /* ── Season select ── */
        select {
            padding: 8px 10px;
            border: 2px solid #e8e8e8;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            color: #333;
            background: white;
        }
        select:focus { border-color: #667eea; }

        /* ── Player card (selected player) ── */
        .player-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.18);
            padding: 20px 24px;
            display: none;
        }
        .player-card.show { display: block; }

        .player-card h2 { font-size: 1.4em; color: #333; margin-bottom: 4px; }
        .player-card .meta { color: #888; font-size: 0.88em; margin-bottom: 14px; }

        .stat-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .stat-pill {
            background: #f8f9ff;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 12px;
        }
        .stat-pill span { font-weight: 700; color: #667eea; }

        /* ── Segments ── */
        .segments {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
        }

        @media (max-width: 900px) {
            .segments { grid-template-columns: 1fr; }
        }

        .segment-panel {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.18);
            overflow: hidden;
        }

        .segment-header {
            padding: 12px 16px;
            font-weight: 700;
            font-size: 0.88em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: white;
        }

        .seg-production .segment-header { background: linear-gradient(135deg, #667eea, #764ba2); }
        .seg-position   .segment-header { background: linear-gradient(135deg, #10b981, #059669); }
        .seg-age        .segment-header { background: linear-gradient(135deg, #f59e0b, #d97706); }

        .segment-header .sub {
            font-size: 10px;
            font-weight: 400;
            opacity: 0.85;
            text-transform: none;
            letter-spacing: 0;
            margin-top: 2px;
        }

        .sim-row {
            display: flex;
            align-items: center;
            padding: 9px 14px;
            border-bottom: 1px solid #f4f4f4;
            gap: 10px;
            cursor: default;
        }
        .sim-row:last-child { border-bottom: none; }
        .sim-row:hover { background: #fafbff; }

        .sim-rank {
            font-size: 11px;
            color: #ccc;
            width: 16px;
            flex-shrink: 0;
            text-align: center;
        }

        .sim-info { flex: 1; min-width: 0; }

        .sim-name {
            font-weight: 600;
            font-size: 13px;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sim-meta {
            font-size: 11px;
            color: #aaa;
            margin-top: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sim-rating {
            font-size: 12px;
            font-weight: 700;
            color: #10b981;
            flex-shrink: 0;
        }

        .sim-score {
            font-size: 10px;
            color: #ccc;
            flex-shrink: 0;
            width: 36px;
            text-align: right;
        }

        .empty-state {
            padding: 30px;
            text-align: center;
            color: #bbb;
            font-size: 13px;
        }

        .loading-state {
            padding: 30px;
            text-align: center;
            color: #aaa;
            font-size: 13px;
        }
    </style>
</head>
<body>
<div class="page">

    <!-- Nav -->
    <div class="nav-tabs">
        <div class="nav-brand">NIL <span>PRO</span></div>
        <a href="/index.html" class="nav-tab">Rankings</a>
        <a href="/similarity.html" class="nav-tab active">Similar Players</a>
    </div>

    <!-- Search controls -->
    <div style="background:white;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.18);padding:14px 18px;display:flex;align-items:center;gap:12px;">
        <div class="search-wrap">
            <input type="text" id="searchInput" placeholder="Search player..." autocomplete="off">
            <div class="search-dropdown" id="searchDropdown"></div>
        </div>
        <select id="seasonSelect">
            <option value="2025-26">2025-26</option>
        </select>
    </div>

    <!-- Selected player card -->
    <div class="player-card" id="playerCard">
        <h2 id="cardName"></h2>
        <div class="meta" id="cardMeta"></div>
        <div class="stat-row" id="cardStats"></div>
    </div>

    <!-- Similarity panels -->
    <div class="segments" id="segments">
        <div class="segment-panel seg-production">
            <div class="segment-header">
                Production
                <div class="sub">All positions · all seasons</div>
            </div>
            <div id="list-production"><div class="empty-state">Search for a player above</div></div>
        </div>
        <div class="segment-panel seg-position">
            <div class="segment-header">
                Same Position
                <div class="sub">Same position group · all seasons</div>
            </div>
            <div id="list-position"><div class="empty-state">Search for a player above</div></div>
        </div>
        <div class="segment-panel seg-age">
            <div class="segment-header">
                Same Age
                <div class="sub">±1 year or same class · all seasons</div>
            </div>
            <div id="list-age"><div class="empty-state">Search for a player above</div></div>
        </div>
    </div>

</div>

<script>
const API_BASE = (location.port === '3000' || location.port === '5500' || location.port === '5173')
    ? 'http://localhost:8000/api'
    : '/api';

let searchTimeout = null;
let selectedPlayer = null;

const searchInput   = document.getElementById('searchInput');
const searchDropdown = document.getElementById('searchDropdown');
const seasonSelect  = document.getElementById('seasonSelect');

// ── Search ────────────────────────────────────────────────────────────────
searchInput.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    const q = searchInput.value.trim();
    if (q.length < 2) { searchDropdown.classList.remove('show'); return; }
    searchTimeout = setTimeout(() => doSearch(q), 200);
});

searchInput.addEventListener('blur', () => {
    setTimeout(() => searchDropdown.classList.remove('show'), 150);
});

async function doSearch(q) {
    const res = await fetch(`${API_BASE}/search?q=${encodeURIComponent(q)}&limit=8`);
    const data = await res.json();
    renderDropdown(data.results);
}

function renderDropdown(results) {
    searchDropdown.innerHTML = '';
    if (!results.length) {
        searchDropdown.innerHTML = '<div class="search-result" style="color:#aaa">No results</div>';
    } else {
        results.forEach(r => {
            const div = document.createElement('div');
            div.className = 'search-result';
            div.innerHTML = `<div>${r.full_name}</div>`;
            div.addEventListener('click', () => selectPlayer(r));
            searchDropdown.appendChild(div);
        });
    }
    searchDropdown.classList.add('show');
}

async function selectPlayer(r) {
    selectedPlayer = r;
    searchInput.value = r.full_name;
    searchDropdown.classList.remove('show');
    await loadSimilarity(r.player_id, seasonSelect.value);
}

seasonSelect.addEventListener('change', () => {
    if (selectedPlayer) loadSimilarity(selectedPlayer.player_id, seasonSelect.value);
});

// ── Similarity ────────────────────────────────────────────────────────────
async function loadSimilarity(playerId, season) {
    ['production', 'position', 'age'].forEach(seg => {
        document.getElementById(`list-${seg}`).innerHTML =
            '<div class="loading-state">Loading...</div>';
    });

    const [simRes, playerRes] = await Promise.all([
        fetch(`${API_BASE}/similarity/${playerId}/${season}`),
        fetch(`${API_BASE}/players/${season}?limit=15000`)
    ]);

    const simData   = await simRes.json();
    const playerData = await playerRes.json();
    const player = playerData.data.find(p => p.player_id == playerId);

    renderPlayerCard(player);

    ['production', 'position', 'age'].forEach(seg => {
        const rows = simData.segments?.[seg] || [];
        renderSegment(seg, rows);
    });
}

function renderPlayerCard(p) {
    if (!p) return;
    const card = document.getElementById('playerCard');
    card.classList.add('show');

    document.getElementById('cardName').textContent = p.full_name;
    document.getElementById('cardMeta').textContent =
        [p.team, p.position, p.class_year, p.height, p.weight ? p.weight + ' lbs' : null, p.age ? 'Age ' + p.age : null]
        .filter(Boolean).join(' · ');

    const stats = [
        ['Rating', p.final_rating?.toFixed(1)],
        ['PPG', p.pts?.toFixed(1)],
        ['RPG', p.reb?.toFixed(1)],
        ['APG', p.ast?.toFixed(1)],
        ['SPG', p.stl?.toFixed(1)],
        ['BPG', p.blk?.toFixed(1)],
        ['MIN', p.min?.toFixed(1)],
        ['3PA', p.fg3a?.toFixed(1)],
        ['3P%', p.fg3_pct != null ? (p.fg3_pct * 100).toFixed(1) + '%' : null],
        ['FG%', p.fg_pct != null ? (p.fg_pct * 100).toFixed(1) + '%' : null],
        ['USG%', p.usg_pct != null ? Number(p.usg_pct).toFixed(1) + '%' : null],
        ['TS%', p.ts_pct != null ? (p.ts_pct * 100).toFixed(1) + '%' : null],
    ];

    document.getElementById('cardStats').innerHTML = stats
        .filter(([, v]) => v != null)
        .map(([l, v]) => `<div class="stat-pill">${l} <span>${v}</span></div>`)
        .join('');
}

function renderSegment(seg, rows) {
    const el = document.getElementById(`list-${seg}`);
    if (!rows.length) {
        el.innerHTML = '<div class="empty-state">No similar players found</div>';
        return;
    }
    el.innerHTML = rows.map(r => `
        <div class="sim-row">
            <div class="sim-rank">${r.rank}</div>
            <div class="sim-info">
                <div class="sim-name">${r.sim_name}</div>
                <div class="sim-meta">${r.sim_team} · ${r.sim_pos} · ${r.sim_season}</div>
            </div>
            <div class="sim-rating">${Number(r.sim_rating).toFixed(1)}</div>
            <div class="sim-score">${Number(r.score).toFixed(3)}</div>
        </div>
    `).join('');
}
</script>
</body>
</html>
